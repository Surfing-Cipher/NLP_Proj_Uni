<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart NLP Support Classifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-mesh"></div>
    
    <div class="container">
        <header>
            <h1>NLP Ticket Classification</h1>
            <p>Enter a customer support ticket to instantly classify it and extract linguistic features.</p>
        </header>

        <main>
            <div class="input-section glass-panel">
                <textarea id="ticket-text" placeholder="E.g., I love the new features in version 2.0! Also, I am using Microsoft Windows but my account is locked." rows="5"></textarea>
                <button id="analyze-btn">
                    <span>Analyze Ticket</span>
                    <div class="spinner hidden" id="loading-spinner"></div>
                </button>
            </div>

            <div class="results-section hidden" id="results-panel">
                <div class="result-card category-card glass-panel">
                    <div>
                        <h3>Predicted Category</h3>
                        <div class="category-badge" id="category-result">Loading...</div>
                    </div>
                    <div>
                        <h3>Sentiment</h3>
                        <div class="category-badge badge-neutral" id="sentiment-result">Loading...</div>
                    </div>
                </div>

                <div class="features-grid">
                    <div class="result-card glass-panel">
                        <h3>Named Entities (NER)</h3>
                        <div class="scroll-box" id="ner-result"></div>
                    </div>

                    <div class="result-card glass-panel">
                        <h3>Part-of-Speech (POS)</h3>
                        <div class="scroll-box" id="pos-result"></div>
                    </div>
                </div>
                    </div>
                </div>
            </div>

            <div class="analytics-section glass-panel" id="analytics-panel">
                <h2>Dataset Analytics</h2>
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="sentimentChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const text = document.getElementById('ticket-text').value;
            if (!text) return;

            const btn = document.getElementById('analyze-btn');
            const spinner = document.getElementById('loading-spinner');
            const resultsPanel = document.getElementById('results-panel');
            
            btn.classList.add('loading');
            spinner.classList.remove('hidden');
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                const data = await response.json();
                
                if(data.error) {
                    alert(data.error);
                    return;
                }

                // Render Category & Sentiment
                document.getElementById('category-result').textContent = data.category;
                
                const sentEl = document.getElementById('sentiment-result');
                sentEl.textContent = data.sentiment;
                sentEl.className = 'category-badge';
                if(data.sentiment === 'Positive') sentEl.classList.add('badge-positive');
                else if(data.sentiment === 'Negative') sentEl.classList.add('badge-negative');
                else sentEl.classList.add('badge-neutral');
                
                // Render NER
                const nerHtml = data.ner.length > 0 
                    ? data.ner.map(e => `<span class="tag ner-tag"><span class="entity">${e[0]}</span> <span class="label">${e[1]}</span></span>`).join('')
                    : '<p class="empty-state">No entities found.</p>';
                document.getElementById('ner-result').innerHTML = nerHtml;

                // Render POS
                const posHtml = data.pos_tags.length > 0
                    ? data.pos_tags.map(p => `<span class="tag pos-tag"><span class="entity">${p[0]}</span> <span class="label">${p[1]}</span></span>`).join('')
                    : '<p class="empty-state">No POS tags found.</p>';
                document.getElementById('pos-result').innerHTML = posHtml;

                resultsPanel.classList.remove('hidden');
                resultsPanel.classList.add('slide-up');

            } catch (err) {
                console.error(err);
                alert("An error occurred during prediction.");
            } finally {
                btn.classList.remove('loading');
                spinner.classList.add('hidden');
            }
        });

        // Load Analytics Data
        async function loadAnalytics() {
            try {
                const response = await fetch('/api/stats');
                if(!response.ok) return;
                const data = await response.json();

                // Category Chart
                const ctxCat = document.getElementById('categoryChart').getContext('2d');
                new Chart(ctxCat, {
                    type: 'pie',
                    data: {
                        labels: Object.keys(data.categories),
                        datasets: [{
                            data: Object.values(data.categories),
                            backgroundColor: ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#f8fafc' } },
                            title: { display: true, text: 'Ticket Categories', color: '#f8fafc' }
                        }
                    }
                });

                // Sentiment Chart
                const ctxSent = document.getElementById('sentimentChart').getContext('2d');
                new Chart(ctxSent, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.sentiments),
                        datasets: [{
                            data: Object.values(data.sentiments),
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#f8fafc' } },
                            title: { display: true, text: 'Ticket Sentiments', color: '#f8fafc' }
                        }
                    }
                });

            } catch (err) {
                console.error("Failed to load analytics", err);
            }
        }
        
        loadAnalytics();
    </script>
</body>
</html>
